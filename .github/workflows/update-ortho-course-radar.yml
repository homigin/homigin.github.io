name: Update Ortho Course Radar

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: python -m pip install -r requirements-ortho-radar.txt

      - name: Fetch course data
        run: python scripts/update_ortho_course_radar.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- static/ortho-course-radar/events.js static/ortho-course-radar/last-run.json; then
            echo "No ortho course radar changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/ortho-course-radar/events.js static/ortho-course-radar/last-run.json
          git commit -m "Update ortho course radar data"
          git push
