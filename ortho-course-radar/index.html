<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>骨科進修雷達</title>
  <meta name="description" content="彙整骨科年會、工作坊、手術實作、影像與研究課程的入口頁。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --card: #fffdf8;
      --ink: #1d2b2a;
      --muted: #687674;
      --line: #dde5df;
      --brand: #0f766e;
      --brand2: #f59e0b;
      --soft: #e7f3ef;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(15, 118, 110, .12), transparent 32rem),
        radial-gradient(circle at 90% 10%, rgba(245, 158, 11, .14), transparent 26rem),
        var(--bg);
      color: var(--ink);
      line-height: 1.65;
    }
    a { color: inherit; }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .hero {
      padding: 52px 0 26px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 14px;
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .lead {
      max-width: 760px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 28px 0 0;
    }
    .stat, .filters, .event, .month-group {
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .stat { padding: 14px 16px; }
    .stat b { display: block; font-size: 26px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 13px; }
    .filters {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 22px auto;
      padding: 14px;
      backdrop-filter: blur(14px);
    }
    .filter-grid {
      display: grid;
      grid-template-columns: 1.1fr .8fr;
      gap: 12px;
    }
    input[type="search"], input[type="date"] {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      font: inherit;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .views {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .views button { min-height: 48px; font-weight: 800; }
    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .check {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      cursor: pointer;
    }
    .check input { width: 16px; height: 16px; accent-color: var(--brand); }
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      padding: 0 13px;
      font: inherit;
      cursor: pointer;
    }
    button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: white;
    }
    main { padding: 0 0 42px; }
    .list-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 26px 0 12px;
    }
    h2 { margin: 0; font-size: 24px; }
    .muted { color: var(--muted); }
    .events {
      display: grid;
      gap: 10px;
    }
    .event {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
    }
    .date {
      border-right: 1px solid var(--line);
      color: var(--brand);
      font-weight: 800;
    }
    .date small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .event h3 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.35;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
    }
    .open {
      color: var(--brand);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }
    .month-group {
      padding: 14px;
    }
    .month-group h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: var(--brand);
    }
    .day-row {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 12px;
      padding: 11px 0;
      border-top: 1px solid var(--line);
    }
    .day-row:first-of-type { border-top: 0; }
    .day {
      color: var(--brand);
      font-weight: 800;
    }
    .announce {
      border-left: 4px solid var(--brand);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
    }
    .ics {
      border-color: var(--brand);
      color: var(--brand);
      font-weight: 800;
    }
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .calendar-title { font-size: 24px; font-weight: 900; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }
    .calendar-layout {
      display: grid;
      grid-template-columns: minmax(300px, .85fr) 1.15fr;
      gap: 10px;
      align-items: start;
    }
    .weekday {
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }
    .cal-day {
      width: 100%;
      min-height: 74px;
      padding: 8px;
      border-radius: 8px;
      border: 0;
      background: #f8faf9;
      color: #687674;
      font-weight: 700;
      text-align: left;
    }
    .cal-day.has {
      background: #d4f0ea;
      color: var(--brand);
    }
    .cal-day.selected {
      outline: 2px solid var(--brand);
      background: var(--brand);
      color: white;
    }
    .cal-day b { display: block; font-size: 20px; line-height: 1.1; }
    .cal-day small { font-weight: 900; }
    .source-group {
      padding: 14px;
    }
    .source-group h3 {
      margin: 0 0 8px;
      color: var(--brand);
    }
    .empty {
      display: none;
      padding: 28px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
    }
    footer {
      padding: 24px 0 36px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .stats, .filter-grid, .views, .calendar-layout { grid-template-columns: 1fr; }
      .event, .day-row { grid-template-columns: 1fr; }
      .date { border-right: 0; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
      .list-head, .calendar-nav { display: block; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">ORTHO COURSE RADAR</p>
      <h1>骨科進修雷達</h1>
      <p class="lead">把骨科年會、關節重建、創傷、脊椎、運動醫學、影像與研究方法課程集中在一頁，快速找下一個值得報名的場次。</p>
      <div class="stats" aria-label="課程統計">
        <div class="stat"><b id="totalCount">0</b><span>筆課程公告</span></div>
        <div class="stat"><b>7</b><span>骨科分類</span></div>
        <div class="stat"><b>2026-06-26</b><span>頁面更新</span></div>
      </div>
    </div>
  </header>

  <nav class="wrap filters" aria-label="課程篩選">
    <div class="views" aria-label="顯示模式">
      <button class="active" data-view="list">課程清單</button>
      <button data-view="calendar">📅 活動行事曆</button>
      <button data-view="webinars">Webinars</button>
      <button data-view="announcements">📢 最新公告</button>
    </div>
    <div class="filter-grid">
      <input id="q" type="search" placeholder="搜尋：TKA、spine、trauma、ultrasound..." aria-label="搜尋課程">
      <input id="from" type="date" aria-label="起始日期">
    </div>
    <div class="filter-options">
      <label class="check"><input id="hideExpired" type="checkbox" checked>排除過期</label>
      <span id="sortHint">排序：一律依活動日期由近到遠</span>
    </div>
    <div class="chips" id="timeChips" aria-label="時間快速篩選"></div>
    <div class="chips" id="modeChips" aria-label="形式快速篩選"></div>
    <div class="chips" id="catChips" aria-label="分類"></div>
    <div class="chips" id="sourceChips" aria-label="來源"></div>
  </nav>

  <main class="wrap">
    <div class="list-head">
      <h2 id="viewTitle">近期骨科課程與工作坊</h2>
      <div class="actions">
        <span class="muted" id="resultCount"></span>
        <button class="ics" id="exportICS">加入目前篩選</button>
      </div>
    </div>
    <section class="events" id="events" aria-live="polite"></section>
    <p class="empty" id="empty">沒有符合條件的課程。換個關鍵字或清掉日期看看。</p>
  </main>

  <footer>
    <div class="wrap">
      <p>資料由 <code>update_events.py</code> 抓取各學會／機構公開公告頁，只顯示標題與連結並導回原站；實際資訊以原公告為準。</p>
    </div>
  </footer>

  <script src="events.js"></script>
  <script src="announcements.js"></script>
  <script src="webinars.js"></script>
  <script>
    const demoEvents = [
      { date: "2026-07-04", title: "進階人工膝關節置換實作工作坊：困難 primary TKA", source: "關節重建醫學會", cat: "關節重建", place: "台北", url: "https://www.jrs.org.tw/" },
      { date: "2026-07-12", title: "骨科住院醫師創傷固定基礎課程：distal radius 到 ankle fracture", source: "骨科醫學會", cat: "創傷", place: "台中", url: "https://www.toa.org.tw/" },
      { date: "2026-07-19", title: "脊椎退化性疾病手術決策與併發症討論會", source: "脊椎外科醫學會", cat: "脊椎", place: "高雄", url: "https://www.tss.org.tw/" },
      { date: "2026-07-26", title: "肩膝運動傷害關節鏡 cadaver lab", source: "運動醫學醫學會", cat: "運動醫學", place: "台北", url: "https://www.tasm.org.tw/" },
      { date: "2026-08-02", title: "骨腫瘤影像判讀與 biopsy planning 精要", source: "骨科醫學會", cat: "影像", place: "線上", url: "https://www.toa.org.tw/" },
      { date: "2026-08-09", title: "小兒髖關節發育不良超音波與轉介策略", source: "小兒骨科醫學會", cat: "小兒骨科", place: "台北", url: "https://www.toa.org.tw/" },
      { date: "2026-08-23", title: "骨質疏鬆與 fragility fracture secondary prevention", source: "骨質疏鬆症學會", cat: "骨鬆", place: "台南", url: "https://www.toa.org.tw/" },
      { date: "2026-09-06", title: "髖關節置換術前 planning：templating、offset 與 leg length", source: "關節重建醫學會", cat: "關節重建", place: "新竹", url: "https://www.jrs.org.tw/" },
      { date: "2026-09-20", title: "骨科研究方法：registry、propensity score 與論文寫作", source: "骨科醫學會", cat: "研究", place: "線上", url: "https://www.toa.org.tw/" }
    ];
    const events = window.ORTHO_EVENTS?.length ? window.ORTHO_EVENTS : demoEvents;
    const announcements = window.ORTHO_ANNOUNCEMENTS || [];
    const webinars = window.ORTHO_WEBINARS || [];
    const searchable = [...events, ...webinars, ...announcements];

    const state = { cat: "", source: "", time: "", mode: "", view: "list", month: "", day: "" };
    let rowsCache = [];
    const $ = (id) => document.getElementById(id);
    const cats = ["全部", ...new Set(searchable.map(e => e.cat).filter(Boolean))];
    const sources = ["全部來源", ...new Set(searchable.map(e => e.source).filter(Boolean))];
    const timeRanges = [
      ["全部日期", ""],
      ["本月", "thisMonth"],
      ["下月", "nextMonth"],
      ["90 天內", "90d"]
    ];
    const modeRanges = [
      ["全部形式", ""],
      ["lab", "lab"]
    ];

    function makeChips(root, items, key) {
      root.innerHTML = items.map((item, i) => {
        const name = Array.isArray(item) ? item[0] : item;
        const value = Array.isArray(item) ? item[1] : (i ? item : "");
        return `<button data-${key}="${esc(value)}" class="${i ? "" : "active"}">${esc(name)}</button>`;
      }).join("");
      root.addEventListener("click", (e) => {
        if (e.target.tagName !== "BUTTON") return;
        state[key] = e.target.dataset[key];
        [...root.children].forEach(btn => btn.classList.toggle("active", btn === e.target));
        render();
      });
    }

    function matches(e) {
      const q = $("q").value.trim().toLowerCase();
      const from = $("from").value;
      const today = todayISO();
      return (!q || `${e.title} ${e.source} ${e.cat} ${e.place}`.toLowerCase().includes(q))
        && (!from || e.date >= from)
        && (!$("hideExpired").checked || e.date >= today)
        && inTimeRange(e.date)
        && (state.view === "webinars" || !state.mode || modeOf(e) === state.mode)
        && (!state.cat || e.cat === state.cat)
        && (!state.source || e.source === state.source);
    }

    function matchesAnnouncement(e) {
      const q = $("q").value.trim().toLowerCase();
      return (!q || `${e.title} ${e.source}`.toLowerCase().includes(q))
        && (!state.source || e.source === state.source);
    }

    function modeOf(e) {
      const text = `${e.mode || ""} ${e.title || ""} ${e.place || ""}`;
      if (/cadaver|大體|simulation|simulator|動物實作|仿真|模型手術|手術體驗|手術.*實作|實作.*手術|真實病人|hands-?on|臨床手術技能|arthroscopic workshop|lab/i.test(text)) return "lab";
      if (/線上|online|webinar|webcast|youtube|replay|直播/i.test(text)) return "線上";
      return "實體";
    }

    function todayISO() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 10);
    }

    function addDays(date, days) {
      const d = new Date(`${date}T00:00:00`);
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function inTimeRange(date) {
      if (!state.time) return true;
      const today = todayISO();
      const ym = date.slice(0, 7);
      if (state.time === "thisMonth") return ym === today.slice(0, 7);
      if (state.time === "nextMonth") return ym === shiftMonth(today.slice(0, 7), 1);
      if (state.time === "90d") return date >= today && date <= addDays(today, 90);
      return true;
    }

    function shiftMonth(ym, offset) {
      const [year, month] = ym.split("-").map(Number);
      const next = new Date(Date.UTC(year, month - 1 + offset, 1));
      return `${next.getUTCFullYear()}-${String(next.getUTCMonth() + 1).padStart(2, "0")}`;
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function safeUrl(url) {
      try {
        const parsed = new URL(url, location.href);
        return /^https?:$/.test(parsed.protocol) ? parsed.href : "#";
      } catch {
        return "#";
      }
    }

    function eventCard(e, mode = "list") {
      return `
        <article class="event ${mode === "announcements" ? "announce" : ""}">
          <div class="date">${esc(e.date.slice(5))}<small>${esc(e.date.slice(0, 4))}</small></div>
          <div>
            <h3>${esc(e.title)}</h3>
            <div class="meta"><span class="tag">${esc(e.cat || modeOf(e))}</span><span>${esc(modeOf(e))}</span><span>${esc(e.source)}</span><span>${esc(e.place || "")}</span></div>
          </div>
          <div class="actions"><button class="ics" data-ics="${esc(e.url)}">加入</button><a class="open" href="${esc(safeUrl(e.url))}" target="_blank" rel="noopener">原站</a></div>
        </article>
      `;
    }

    function renderCalendar(rows) {
      if (!state.month) state.month = (rows[0]?.date || todayISO()).slice(0, 7);
      const [year, month] = state.month.split("-").map(Number);
      const first = new Date(year, month - 1, 1);
      const days = new Date(year, month, 0).getDate();
      const counts = rows.filter(e => e.date.startsWith(state.month)).reduce((acc, e) => {
        acc[Number(e.date.slice(8, 10))] = (acc[Number(e.date.slice(8, 10))] || 0) + 1;
        return acc;
      }, {});
      const cells = Array(first.getDay()).fill(`<div></div>`).concat(
        Array.from({ length: days }, (_, i) => {
          const day = i + 1;
          const fullDate = `${state.month}-${String(day).padStart(2, "0")}`;
          return `<button class="cal-day ${counts[day] ? "has" : ""} ${state.day === fullDate ? "selected" : ""}" data-day="${esc(fullDate)}"><b>${day}</b>${counts[day] ? `<small>${counts[day]}場</small>` : ""}</button>`;
        })
      );
      const monthRows = rows.filter(e => e.date.startsWith(state.month));
      const shownRows = state.day ? monthRows.filter(e => e.date === state.day) : monthRows;
      return `
        <div class="calendar-layout">
          <section class="month-group">
            <div class="calendar-nav">
              <button data-month="-1">‹</button>
              <div class="calendar-title">${esc(state.month.replace("-", "年"))}月</div>
              <button data-month="1">›</button>
            </div>
            <div class="calendar-grid">
              ${["日", "一", "二", "三", "四", "五", "六"].map(d => `<div class="weekday">${d}</div>`).join("")}
              ${cells.join("")}
            </div>
          </section>
          <section class="month-group">
            <h3>${esc(state.day || state.month)} 場次</h3>
            ${shownRows.map(e => `
              <div class="day-row">
                <div class="day">${esc(e.date.slice(5))}</div>
                <div>
                  <a class="open" href="${esc(safeUrl(e.url))}" target="_blank" rel="noopener">${esc(e.title)}</a>
                  <div class="meta"><span class="tag">${esc(e.cat)}</span><span>${esc(modeOf(e))}</span><span>${esc(e.source)}</span><span>${esc(e.place)}</span></div>
                </div>
              </div>
            `).join("")}
          </section>
        </div>
      `;
    }

    function renderAnnouncements(rows) {
      const groups = rows.reduce((acc, e) => {
        (acc[e.source] ||= []).push(e);
        return acc;
      }, {});
      return Object.entries(groups).map(([source, items]) => `
        <section class="month-group source-group">
          <h3>${esc(source)}</h3>
          ${items.map(e => `
            <div class="day-row">
              <div class="day">${esc(e.date)}</div>
              <div><a class="open" href="${esc(safeUrl(e.url))}" target="_blank" rel="noopener">${esc(e.title)}</a></div>
            </div>
          `).join("")}
        </section>
      `).join("");
    }

    function activeDataset() {
      return state.view === "webinars" ? webinars : events;
    }

    function render() {
      const rows = state.view === "announcements"
        ? announcements.filter(matchesAnnouncement).sort((a, b) => b.date.localeCompare(a.date))
        : activeDataset().filter(matches).sort((a, b) => a.date.localeCompare(b.date));
      rowsCache = rows;
      const titles = {
        list: "近期骨科課程與工作坊",
        calendar: "📅 活動行事曆",
        webinars: "Webinars",
        announcements: "📢 最新公告"
      };
      $("viewTitle").textContent = titles[state.view];
      $("sortHint").textContent = state.view === "announcements" ? "排序：公告依日期新到舊，並按學會分組" : "排序：一律依活動日期由近到遠";
      $("exportICS").style.display = state.view === "announcements" ? "none" : "";
      $("modeChips").style.display = ["list", "calendar"].includes(state.view) ? "" : "none";
      $("events").innerHTML = state.view === "announcements"
        ? renderAnnouncements(rows)
        : state.view === "calendar"
          ? renderCalendar(rows)
          : rows.map(e => eventCard(e, state.view)).join("");
      $("resultCount").textContent = `${rows.length} / ${(state.view === "announcements" ? announcements : activeDataset()).length} 筆`;
      $("empty").style.display = rows.length ? "none" : "block";
    }

    document.querySelector(".views").addEventListener("click", (e) => {
      if (e.target.tagName !== "BUTTON") return;
      state.view = e.target.dataset.view;
      state.month = "";
      state.day = "";
      [...e.currentTarget.children].forEach(btn => btn.classList.toggle("active", btn === e.target));
      render();
    });
    $("events").addEventListener("click", (e) => {
      if (e.target.dataset.month) {
        state.month = shiftMonth(state.month, Number(e.target.dataset.month));
        state.day = "";
        render();
      }
      const dayButton = e.target.closest("[data-day]");
      if (dayButton) {
        state.day = state.day === dayButton.dataset.day ? "" : dayButton.dataset.day;
        render();
      }
      if (e.target.dataset.ics) {
        const item = rowsCache.find(row => row.url === e.target.dataset.ics);
        if (item) downloadICS([item]);
      }
    });
    $("exportICS").addEventListener("click", () => downloadICS(rowsCache));
    makeChips($("timeChips"), timeRanges, "time");
    makeChips($("modeChips"), modeRanges, "mode");
    makeChips($("catChips"), cats, "cat");
    makeChips($("sourceChips"), sources, "source");
    $("q").addEventListener("input", render);
    $("from").addEventListener("input", render);
    $("hideExpired").addEventListener("change", render);
    $("totalCount").textContent = events.length;
    render();

    function downloadICS(rows) {
      if (!rows.length) return;
      const body = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Homigin//Ortho Radar//ZH-TW", ...rows.map(toICS), "END:VCALENDAR"].join("\r\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([body], { type: "text/calendar;charset=utf-8" }));
      a.download = rows.length === 1 ? `${safeName(rows[0].title)}.ics` : "ortho-radar.ics";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function toICS(e) {
      const start = e.date.replaceAll("-", "");
      const end = addDays(e.date, 1).replaceAll("-", "");
      return ["BEGIN:VEVENT", `UID:${btoa(unescape(encodeURIComponent(e.url))).slice(0, 48)}@ortho-radar`, `DTSTART;VALUE=DATE:${start}`, `DTEND;VALUE=DATE:${end}`, `SUMMARY:${icsText(e.title)}`, `LOCATION:${icsText(e.place || "")}`, `URL:${safeUrl(e.url)}`, `DESCRIPTION:${icsText(`${e.source || ""} ${e.cat || ""}`)}`, "END:VEVENT"].join("\r\n");
    }

    function icsText(text) {
      return String(text || "").replace(/[\\,;]/g, "\\$&").replace(/\n/g, "\\n");
    }

    function safeName(text) {
      return String(text || "event").replace(/[\\/:*?"<>|]+/g, "_").slice(0, 60);
    }

    // ponytail: tiny in-page check, replace with real tests if this grows beyond a static prototype.
    console.assert([...events, ...webinars].every(e => /^\d{4}-\d{2}-\d{2}$/.test(e.date) && e.title && e.url), "bad event data");
  </script>
</body>
</html>
